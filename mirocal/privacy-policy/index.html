<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy - MiroCal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.6;
      padding: 20px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 40px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .app-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    
    .lang-toggle {
      display: flex;
      align-items: center;
    }
    
    .lang-select {
      min-width: 96px;
      padding: 6px 28px 6px 10px;
      font-size: 13px;
      border: 1px solid #d2d2d7;
      background: #ffffff;
      border-radius: 6px;
      cursor: pointer;
      color: #1d1d1f;
      transition: border-color 0.2s, background-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #86868b 50%), linear-gradient(135deg, #86868b 50%, transparent 50%);
      background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }
    
    .lang-select:hover {
      background: #f5f5f7;
    }
    
    .lang-select:focus {
      outline: none;
      border-color: #0071e3;
      background-color: #ffffff;
    }
    
    #content {
      margin-top: 24px;
    }
    
    #content strong {
      display: block;
      font-size: 20px;
      font-weight: 600;
      margin-top: 24px;
      margin-bottom: 12px;
      color: #1d1d1f;
    }
    
    #content strong:first-child {
      margin-top: 0;
      font-size: 28px;
    }
    
    #content p {
      margin-bottom: 8px;
      color: #1d1d1f;
    }
    
    #content ul {
      margin-left: 24px;
      margin-bottom: 8px;
    }
    
    #content li {
      margin-bottom: 4px;
    }
    
    #content hr {
      margin-top: 32px;
      margin-bottom: 16px;
      border: none;
      border-top: 1px solid #d2d2d7;
    }
    
    #content a {
      color: #0071e3;
      text-decoration: none;
    }
    
    #content a:hover {
      text-decoration: underline;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #86868b;
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="../assets/AppIcon.png" alt="MiroCal" class="app-icon">
      <div class="lang-toggle">
        <select id="lang-select" class="lang-select" aria-label="Language selector">
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="zh-tw">繁體中文</option>
          <option value="zh-cn">简体中文</option>
          <option value="ko">한국어</option>
        </select>
      </div>
    </div>
    
    <div id="content">
      <p class="loading">Loading...</p>
    </div>
  </div>
  
  <script>
    const supportedLanguages = ['en', 'ja', 'zh-tw', 'zh-cn', 'ko'];

    async function loadContent(lang) {
      try {
        const response = await fetch(`${lang}.html`);
        if (!response.ok) throw new Error('Failed to load content');
        
        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const bodyContent = doc.body.innerHTML;
        
        document.getElementById('content').innerHTML = bodyContent;
        
        const titleByLang = {
          en: 'Privacy Policy - MiroCal',
          ja: 'プライバシーポリシー - MiroCal',
          'zh-tw': '隱私權政策 - MiroCal',
          'zh-cn': '隐私政策 - MiroCal',
          ko: '개인정보 처리방침 - MiroCal'
        };
        document.documentElement.lang = lang in titleByLang ? lang : 'en';
        document.title = titleByLang[lang] || titleByLang.en;
      } catch (error) {
        document.getElementById('content').innerHTML = '<p>Error loading content. Please try again.</p>';
        console.error('Error loading content:', error);
      }
    }

    function switchLang(lang) {
      const resolvedLang = supportedLanguages.includes(lang) ? lang : 'en';
      const url = new URL(window.location);
      url.searchParams.set('lang', resolvedLang);
      window.history.replaceState({}, '', url);

      const langSelect = document.getElementById('lang-select');
      if (langSelect) {
        langSelect.value = resolvedLang;
      }

      loadContent(resolvedLang);
    }
    
    (function() {
      const params = new URLSearchParams(window.location.search);
      const langParam = params.get('lang') || 'en';
      const lang = supportedLanguages.includes(langParam) ? langParam : 'en';
      
      const langSelect = document.getElementById('lang-select');
      if (langSelect) {
        langSelect.addEventListener('change', (event) => {
          switchLang(event.target.value);
        });
      }

      switchLang(lang);
    })();
  </script>
</body>
</html>
