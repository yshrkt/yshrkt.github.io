<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="title">Contact Us - MiroCal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.6;
      padding: 20px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 40px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .app-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    
    .lang-toggle {
      display: flex;
      align-items: center;
    }
    
    .lang-select {
      min-width: 96px;
      padding: 6px 28px 6px 10px;
      font-size: 13px;
      border: 1px solid #d2d2d7;
      background: #ffffff;
      border-radius: 6px;
      cursor: pointer;
      color: #1d1d1f;
      transition: border-color 0.2s, background-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #86868b 50%), linear-gradient(135deg, #86868b 50%, transparent 50%);
      background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }
    
    .lang-select:hover {
      background: #f5f5f7;
    }
    
    .lang-select:focus {
      outline: none;
      border-color: #0071e3;
      background-color: #ffffff;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1d1d1f;
    }
    
    .subtitle {
      color: #86868b;
      margin-bottom: 32px;
      font-size: 15px;
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #1d1d1f;
    }
    
    .required::after {
      content: ' *';
      color: #ff3b30;
    }
    
    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      background-color: #fafafa;
      transition: border-color 0.2s, background-color 0.2s;
    }
    
    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      outline: none;
      border-color: #0071e3;
      background-color: #ffffff;
    }
    
    textarea {
      resize: vertical;
      min-height: 120px;
    }
    
    .submit-btn {
      width: 100%;
      padding: 14px 24px;
      font-size: 17px;
      font-weight: 500;
      color: #ffffff;
      background-color: #0071e3;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    .submit-btn:hover {
      background-color: #0077ed;
    }
    
    .submit-btn:active {
      background-color: #006edb;
    }
    
    .submit-btn:disabled {
      background-color: #c7c7cc;
      cursor: not-allowed;
    }
    
    .success-message {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }
    
    .success-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background-color: #34c759;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .success-icon svg {
      width: 32px;
      height: 32px;
      fill: #ffffff;
    }
    
    .success-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1d1d1f;
    }
    
    .success-text {
      color: #86868b;
      font-size: 15px;
    }
    
    .hint {
      font-size: 13px;
      color: #86868b;
      margin-top: 4px;
    }
    
    .footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #d2d2d7;
      font-size: 13px;
      color: #86868b;
    }
    
    .footer a {
      color: #0071e3;
      text-decoration: none;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 24px;
      }
      
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="../assets/AppIcon.png" alt="MiroCal" class="app-icon">
      <div class="lang-toggle">
        <select id="lang-select" class="lang-select" onchange="switchLang(this.value)" aria-label="Language selector">
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="zh-Hant">繁體中文</option>
          <option value="zh-Hans">简体中文</option>
          <option value="ko">한국어</option>
        </select>
      </div>
    </div>
    
    <div id="contact-form">
      <h1 data-i18n="heading">お問い合わせ</h1>
      <p class="subtitle" data-i18n="subtitle">MiroCalに関するご質問やご要望をお送りください。</p>
      
      <form action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSdhD-WDxBZO9fgnZsHlPdod0I_-r55IWMIeuXsJIh-cKpQZSA/formResponse" method="POST" target="hidden_iframe" onsubmit="handleSubmit(event)">
        <input type="hidden" name="entry.827035796" value="MiroCal">
        
        <div class="form-group">
          <label for="email" class="required" data-i18n="labelEmail">メールアドレス</label>
          <input type="email" id="email" name="emailAddress" required data-i18n-placeholder="placeholderEmail">
          <p class="hint" data-i18n="hintEmail">返信先として使用します</p>
        </div>
        
        <div class="form-group">
          <label for="name" data-i18n="labelName">お名前</label>
          <input type="text" id="name" name="entry.190102671" data-i18n-placeholder="placeholderName">
          <p class="hint" data-i18n="hintOptional">任意</p>
        </div>
        
        <div class="form-group">
          <label for="device" data-i18n="labelDevice">デバイスの種類</label>
          <input type="text" id="device" name="entry.1312881694" data-i18n-placeholder="placeholderDevice">
          <p class="hint" data-i18n="hintDevice">ご利用のデバイスをお知らせください</p>
        </div>
        
        <div class="form-group">
          <label for="os" data-i18n="labelOs">OSバージョン</label>
          <input type="text" id="os" name="entry.1043616751" data-i18n-placeholder="placeholderOs">
          <p class="hint" data-i18n="hintOs">ご利用のOSバージョンをお知らせください</p>
        </div>
        
        <div class="form-group">
          <label for="message" class="required" data-i18n="labelMessage">お問い合わせ内容</label>
          <textarea id="message" name="entry.585262482" required data-i18n-placeholder="placeholderMessage"></textarea>
        </div>
        
        <button type="submit" class="submit-btn" data-i18n="submit">送信する</button>
      </form>
    </div>
    
    <div id="success-message" class="success-message">
      <div class="success-icon">
        <svg viewBox="0 0 24 24">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
      </div>
      <h2 class="success-title" data-i18n="successTitle">送信完了しました</h2>
      <p class="success-text" data-i18n="successText">お問い合わせありがとうございます。<br>内容を確認後、返信いたします。</p>
    </div>
    
    <div class="footer">
      <p><span data-i18n="footerLabel">直接のご連絡はこちら:</span> <a href="mailto:support@sputnik-apps.com">support@sputnik-apps.com</a></p>
    </div>
  </div>
  
  <iframe name="hidden_iframe" style="display:none;"></iframe>
  
  <script>
    const i18n = {
      ja: {
        title: 'お問い合わせ - MiroCal',
        heading: 'お問い合わせ',
        subtitle: 'MiroCalに関するご質問やご要望をお送りください。',
        labelEmail: 'メールアドレス',
        placeholderEmail: 'example@email.com',
        hintEmail: '返信先として使用します',
        labelName: 'お名前',
        placeholderName: '山田 太郎',
        hintOptional: '任意',
        labelDevice: 'デバイスの種類',
        placeholderDevice: '例: iPhone 16, iPad Pro',
        hintDevice: 'ご利用のデバイスをお知らせください',
        labelOs: 'OSバージョン',
        placeholderOs: '例: iOS 18.3, iPadOS 18.3',
        hintOs: 'ご利用のOSバージョンをお知らせください',
        labelMessage: 'お問い合わせ内容',
        placeholderMessage: 'お問い合わせ内容をご記入ください',
        submit: '送信する',
        successTitle: '送信完了しました',
        successText: 'お問い合わせありがとうございます。<br>内容を確認後、返信いたします。',
        footerLabel: '直接のご連絡はこちら:'
      },
      en: {
        title: 'Contact Us - MiroCal',
        heading: 'Contact Us',
        subtitle: 'Please send us your questions or feedback about MiroCal.',
        labelEmail: 'Email Address',
        placeholderEmail: 'example@email.com',
        hintEmail: 'Used for reply',
        labelName: 'Name',
        placeholderName: 'John Doe',
        hintOptional: 'Optional',
        labelDevice: 'Device Type',
        placeholderDevice: 'e.g., iPhone 16, iPad Pro',
        hintDevice: 'Please let us know your device',
        labelOs: 'OS Version',
        placeholderOs: 'e.g., iOS 18.3, iPadOS 18.3',
        hintOs: 'Please let us know your OS version',
        labelMessage: 'Message',
        placeholderMessage: 'Please enter your message',
        submit: 'Submit',
        successTitle: 'Message Sent',
        successText: 'Thank you for contacting us.<br>We will review your message and get back to you.',
        footerLabel: 'Direct contact:'
      },
      'zh-Hant': {
        title: '聯絡我們 - MiroCal',
        heading: '聯絡我們',
        subtitle: '請將您對 MiroCal 的問題或建議傳送給我們。',
        labelEmail: '電子郵件地址',
        placeholderEmail: 'example@email.com',
        hintEmail: '將用於回覆您',
        labelName: '姓名',
        placeholderName: '王小明',
        hintOptional: '選填',
        labelDevice: '裝置類型',
        placeholderDevice: '例如：iPhone 16、iPad Pro',
        hintDevice: '請告訴我們您使用的裝置',
        labelOs: 'OS 版本',
        placeholderOs: '例如：iOS 18.3、iPadOS 18.3',
        hintOs: '請告訴我們您的 OS 版本',
        labelMessage: '訊息內容',
        placeholderMessage: '請輸入您的訊息內容',
        submit: '送出',
        successTitle: '已送出訊息',
        successText: '感謝您與我們聯絡。<br>我們將確認內容後回覆您。',
        footerLabel: '直接聯絡：'
      },
      'zh-Hans': {
        title: '联系我们 - MiroCal',
        heading: '联系我们',
        subtitle: '请把您对 MiroCal 的问题或建议发送给我们。',
        labelEmail: '邮箱地址',
        placeholderEmail: 'example@email.com',
        hintEmail: '将用于回复您',
        labelName: '姓名',
        placeholderName: '张三',
        hintOptional: '选填',
        labelDevice: '设备类型',
        placeholderDevice: '例如：iPhone 16、iPad Pro',
        hintDevice: '请告诉我们您使用的设备',
        labelOs: 'OS 版本',
        placeholderOs: '例如：iOS 18.3、iPadOS 18.3',
        hintOs: '请告诉我们您的 OS 版本',
        labelMessage: '消息内容',
        placeholderMessage: '请输入您的消息内容',
        submit: '提交',
        successTitle: '发送成功',
        successText: '感谢您的联系。<br>我们会查看您的消息并尽快回复。',
        footerLabel: '直接联系：'
      },
      ko: {
        title: '문의하기 - MiroCal',
        heading: '문의하기',
        subtitle: 'MiroCal에 대한 질문이나 의견을 보내주세요.',
        labelEmail: '이메일 주소',
        placeholderEmail: 'example@email.com',
        hintEmail: '회신용으로 사용됩니다',
        labelName: '이름',
        placeholderName: '홍길동',
        hintOptional: '선택 사항',
        labelDevice: '기기 종류',
        placeholderDevice: '예: iPhone 16, iPad Pro',
        hintDevice: '사용 중인 기기를 알려주세요',
        labelOs: 'OS 버전',
        placeholderOs: '예: iOS 18.3, iPadOS 18.3',
        hintOs: '사용 중인 OS 버전을 알려주세요',
        labelMessage: '문의 내용',
        placeholderMessage: '문의 내용을 입력해 주세요',
        submit: '보내기',
        successTitle: '전송 완료',
        successText: '문의해 주셔서 감사합니다.<br>내용을 확인한 후 답변드리겠습니다.',
        footerLabel: '직접 연락:'
      }
    };

    const legacyLanguageAliases = {
      'zh-tw': 'zh-Hant',
      'zh-cn': 'zh-Hans'
    };

    function normalizeLangCode(lang) {
      return legacyLanguageAliases[lang] || lang;
    }
    
    function switchLang(lang) {
      const normalizedLang = normalizeLangCode(lang);
      const resolvedLang = i18n[normalizedLang] ? normalizedLang : 'en';
      const texts = i18n[resolvedLang];
      document.documentElement.lang = resolvedLang;
      
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (texts[key]) {
          if (key === 'successText') {
            el.innerHTML = texts[key];
          } else {
            el.textContent = texts[key];
          }
        }
      });
      
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (texts[key]) {
          el.placeholder = texts[key];
        }
      });
      
      const langSelect = document.getElementById('lang-select');
      if (langSelect) {
        langSelect.value = resolvedLang;
      }
      
      const url = new URL(window.location);
      url.searchParams.set('lang', resolvedLang);
      window.history.replaceState({}, '', url);
    }
    
    (function() {
      const params = new URLSearchParams(window.location.search);
      const device = params.get('device');
      const os = params.get('os');
      const lang = params.get('lang') || 'en';
      
      if (device) {
        document.getElementById('device').value = decodeURIComponent(device);
      }
      if (os) {
        document.getElementById('os').value = decodeURIComponent(os);
      }
      
      switchLang(lang);
    })();
    
    function handleSubmit(event) {
      document.getElementById('contact-form').style.display = 'none';
      document.getElementById('success-message').style.display = 'block';
    }
  </script>
</body>
</html>
